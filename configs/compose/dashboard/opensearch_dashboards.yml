# configs/compose/dashboard/opensearch_dashboards.yml
# Wazuh Dashboard config for Docker Compose mode.

server.host: 0.0.0.0
server.port: 5601
server.name: wazuh-dashboard
server.ssl.enabled: true
server.ssl.certificate: /usr/share/wazuh-dashboard/certs/dashboard.pem
server.ssl.key: /usr/share/wazuh-dashboard/certs/dashboard-key.pem

opensearch.hosts: https://wazuh-indexer:9200
opensearch.ssl.verificationMode: certificate
opensearch.ssl.certificateAuthorities:
  - /usr/share/wazuh-dashboard/certs/root-ca.pem
opensearch.ssl.certificate: /usr/share/wazuh-dashboard/certs/dashboard.pem
opensearch.ssl.key: /usr/share/wazuh-dashboard/certs/dashboard-key.pem
opensearch.requestHeadersAllowlist:
  - securitytenant
  - Authorization
opensearch_security.multitenancy.enabled: false
opensearch_security.readonly_mode.roles:
  - kibana_read_only

uiSettings.overrides.defaultRoute: /app/wazuh
