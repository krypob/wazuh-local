# configs/wazuh/indexer/statefulset.yaml
# Wazuh Indexer (OpenSearch) — single-replica StatefulSet for local dev.
# Resource limits tuned down from production defaults.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  serviceName: wazuh-indexer
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-indexer
  template:
    metadata:
      labels:
        app: wazuh-indexer
    spec:
      # Required: OpenSearch needs vm.max_map_count >= 262144
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true

      containers:
        - name: wazuh-indexer
          image: wazuh/wazuh-indexer:4.9.0
          imagePullPolicy: IfNotPresent

          # ── Ports ──────────────────────────────────────────────────────────
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport

          # ── Resources (lightweight tuned) ──────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # ── Environment ────────────────────────────────────────────────────
          # OPENSEARCH_JAVA_OPTS is intentionally omitted — heap and direct
          # memory are configured in jvm.options via ConfigMap to avoid
          # duplicate JVM flags (OpenSearch merges both sources).
          env:
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-passwords
                  key: indexer-password

          # ── Volume mounts ──────────────────────────────────────────────────
          volumeMounts:
            - name: indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: indexer-config
              mountPath: /usr/share/wazuh-indexer/opensearch.yml
              subPath: opensearch.yml
            - name: indexer-config
              mountPath: /usr/share/wazuh-indexer/jvm.options
              subPath: jvm.options
            - name: indexer-certs
              mountPath: /usr/share/wazuh-indexer/certs
              readOnly: true

          # ── Probes ─────────────────────────────────────────────────────────
          # Readiness: TCP socket — works before security plugin is initialized.
          # Auth-based HTTP probe fails on first boot because securityadmin
          # hasn't run yet, causing a false timeout.
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30   # 60 + 30*10 = 360s total window
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

      volumes:
        - name: indexer-data
          persistentVolumeClaim:
            claimName: wazuh-indexer-data
        - name: indexer-config
          configMap:
            name: wazuh-indexer-config
        - name: indexer-certs
          secret:
            secretName: wazuh-indexer-certs
            # 0600 matches what OpenSearch security plugin expects (0600 files,
            # 0700 dirs). Without this Kubernetes defaults to 0644 and logs
            # dozens of "insecure file permissions" warnings on every startup.
            defaultMode: 0600

      # fsGroup: file ownership for mounted volumes
      # seccompProfile Unconfined: required for Colima/Lima kernels that do
      # not compile CONFIG_SECCOMP — without this OpenSearch logs a fatal
      # UnsupportedOperationException and may fail to start.
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: Unconfined
